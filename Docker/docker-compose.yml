version: '3.8'

services:
  selenium-hub:
    image: selenium/hub:4.0.0
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"

  chrome-node:
    image: selenium/node-chrome:4.0.0
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 2

  edge-node:
    image: selenium/node-edge:4.0.0
    depends_on:
      - selenium-hub
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 2

  test-chrome:
    build: .
    depends_on:
      - chrome-node
    environment:
      BROWSER: chrome
      GRID_HUB_URL: http://selenium-hub:4444
    volumes:
      - ./reports:/tests/reports

  test-edge:
    build: .
    depends_on:
      - edge-node
    environment:
      BROWSER: edge
      GRID_HUB_URL: http://selenium-hub:4444
    volumes:
      - ./reports:/tests/reports